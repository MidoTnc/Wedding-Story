<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- 폰트 렌더링 최적화를 위한 CSS -->
        <style>
            .title { font-family: 'Georgia', 'Nanum Myeongjo', serif; font-style: italic; font-size: 54px; fill: #4A423E; }
            .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 300; font-size: 18px; letter-spacing: 22px; fill: #8A817C; }
        </style>
    </defs>

    <!-- 1. 배경: 앱 화면과 100% 동일한 아이보리 화이트 + 모서리 둥글게(라운딩) 처리 -->
    <rect width="512" height="512" rx="128" fill="#FCFBF9"/>

    <!-- 2. 심플하고 모던한 라인 아트 (웨딩홀의 아치 상징) -->
    <path d="M 170 290 L 170 190 A 86 86 0 0 1 342 190 L 342 290" fill="none" stroke="#D4B8B1" stroke-width="3" stroke-linecap="round"/>

    <!-- 3. 교차하는 두 개의 웨딩 밴드 (영원한 약속) -->
    <circle cx="228" cy="220" r="34" fill="none" stroke="#B89B94" stroke-width="3"/>
    <circle cx="284" cy="220" r="34" fill="none" stroke="#D4B8B1" stroke-width="3"/>

    <!-- 4. 미니멀한 반짝임 포인트 (아치 중앙 상단) -->
    <path d="M 256 120 L 258.5 128.5 L 267 131 L 258.5 133.5 L 256 142 L 253.5 133.5 L 245 131 L 253.5 128.5 Z" fill="#D4B8B1"/>

    <!-- 5. 고급스러운 2단 타이포그래피 -->
    <text x="256" y="370" class="title" text-anchor="middle">Wedding</text>
    <!-- letter-spacing 때문에 시각적 중앙을 맞추기 위해 x좌표를 살짝 우측(267)으로 조정 -->
    <text x="267" y="420" class="subtitle" text-anchor="middle">STORY</text>
</svg>